# =============================================
# APPLICATION CONFIG
# =============================================
spring.application.name=WebInAnAo

server.port=8080

# =============================================
# DATABASE - SQL SERVER
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebInAnAo;encrypt=false;trustServerCertificate=true;characterEncoding=UTF-8
spring.datasource.username=sa1
spring.datasource.password=123456

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA & HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =============================================
# Encoding
# =============================================
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# =============================================
# Logging
# =============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.webinanao=INFO

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# CORS - React Frontend
# =============================================
allowed.origins=http://localhost:5173
# JWT Config
app.auth.tokenSecret=webinanao-super-secret-key-minimum-32-characters-long
app.auth.tokenExpirationMs=86400000

